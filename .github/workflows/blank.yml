name: Build libpdfium.so via pdfium-binaries (Android arm64)

# Reuses the actual build pipeline from https://github.com/bblanchon/pdfium-binaries
# (the project that publishes the official pdfium-android-arm64.tgz releases).
# This is necessary because vanilla pdfium source does NOT produce a standalone
# libpdfium.so on Android without pdfium-binaries' BUILD.gn patches —
# see steps/03-patch.sh in that repo.

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Chromium/pdfium branch (default=main, or e.g. chromium/7881)'
        required: false
        default: 'main'
      enable_v8:
        description: 'Enable V8/JS engine (needed for XFA forms) — bigger/slower build'
        required: false
        default: 'false'

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 300

    steps:
      - name: Checkout pdfium-binaries build scripts
        uses: actions/checkout@v4
        with:
          repository: bblanchon/pdfium-binaries
          ref: master

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache
          sudo apt-get clean
          df -h

      - name: Run build.sh (android arm64)
        run: |
          ARGS=()
          if [ -n "${{ inputs.branch }}" ] && [ "${{ inputs.branch }}" != "main" ]; then
            ARGS+=(-b "${{ inputs.branch }}")
          fi
          if [ "${{ inputs.enable_v8 }}" == "true" ]; then
            ARGS+=(-j)
          fi
          ./build.sh "${ARGS[@]}" android arm64

      - name: Locate build output
        if: always()
        run: |
          echo "--- packed artifacts (.tgz) ---"
          find . "$HOME" -maxdepth 6 -iname '*.tgz' 2>/dev/null
          echo "--- any loose libpdfium*.so ---"
          find . "$HOME" -maxdepth 8 -iname 'libpdfium*.so' 2>/dev/null
          echo "--- top-level repo contents for reference ---"
          ls -la

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: libpdfium-android-arm64
          path: |
            **/*.tgz
            **/libpdfium*.so
          if-no-files-found: warn
          retention-days: 14
