Run cd "$HOME/pdfium_workspace/pdfium"
  cd "$HOME/pdfium_workspace/pdfium"
  SO=out/arm64/libpdfium.so
  STRIP_BIN=$(find "$HOME/pdfium_workspace" -type f -name 'llvm-strip' 2>/dev/null | head -n1)
  if [ -n "$STRIP_BIN" ]; then
    echo "Using $STRIP_BIN"
    "$STRIP_BIN" --strip-unneeded "$SO"
  elif command -v llvm-strip >/dev/null 2>&1; then
    llvm-strip --strip-unneeded "$SO"
  elif command -v strip >/dev/null 2>&1; then
    strip --strip-unneeded "$SO"
  else
    echo "No strip tool found anywhere, leaving binary unstripped"
  fi
  file "$SO"
  ls -la "$SO"
  shell: /usr/bin/bash -e {0}
